---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMUser
metadata:
  name: vmuser-sample
spec:
  username: simple-user
  password: simple-password
  targetRefs:
  - name: write
  - name: read
---
apiVersion: operator.victoriametrics.com/v1alpha1
kind: VMDistributed
metadata:
  name: sample-override
spec:
  vmauth:
    name: global-vmauth
    spec:
      selectAllByDefault: true
      replicaCount: 1
  zoneCommon:
    vmagent:
      spec:
        replicaCount: 1
    vmcluster:
      name: vmcluster-%ZONE%
      spec:
        vmstorage:
          replicaCount: 1
        vmselect:
          replicaCount: 1
        vminsert:
          replicaCount: 1
  zones:
    - name: us-east-1
    - name: us-west-2
