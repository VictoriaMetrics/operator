apiVersion: operator.victoriametrics.com/v1alpha1
kind: VLDistributed
metadata:
  name: sample-override
spec:
  vmauth:
    name: global-vmauth
    spec:
      unauthorizedUserAccessSpec:
        targetRefs:
          - name: read
          - name: write
      replicaCount: 1
  zoneCommon:
    vlagent:
      spec:
        replicaCount: 1
    vlcluster:
      name: vlcluster-%ZONE%
      spec:
        vlstorage:
          replicaCount: 1
        vlselect:
          replicaCount: 1
        vlinsert:
          replicaCount: 1
  zones:
    - name: us-east-1
      vlcluster:
        spec:
          vlselect:
            replicaCount: 3
    - name: us-west-2
      vlcluster:
        spec:
          vlselect:
            replicaCount: 4
    - name: eu-west-1
      vlcluster:
        spec:
          vlselect:
            replicaCount: 2
