apiVersion: operator.victoriametrics.com/v1alpha1
kind: VLDistributed
metadata:
  name: sample-vmauth
spec:
  vmauth:
    name: global-vmauth
    spec:
      unauthorizedUserAccessSpec:
        targetRefs:
          - name: read
          - name: write
      image:
        repository: victoriametrics/vmauth
        pullPolicy: IfNotPresent
      replicaCount: 1
      resources:
        requests:
          cpu: "250m"
          memory: "350Mi"
        limits:
          cpu: "500m"
          memory: "850Mi"
  zoneCommon:
    vlagent:
      spec:
        replicaCount: 1
    vlcluster:
      spec:
        vlstorage:
          replicaCount: 1
        vlselect:
          replicaCount: 1
        vlinsert:
          replicaCount: 1
  zones:
    - name: us-east-1
    - name: us-west-2
    - name: eu-west-1
