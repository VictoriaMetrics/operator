name: Save Go Cache
description: Trim old entries and persist Go module and build cache

runs:
  using: composite
  steps:
    - name: Trim Go cache
      shell: bash
      run: find ~/.cache/go-build -type f -mmin +90 -delete
    - name: Set Go cache date
      shell: bash
      run: echo "GO_CACHE_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
    - name: Save Go cache
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: "${{ runner.os }}-go-${{ hashFiles('go.mod') }}-${{ env.GO_CACHE_DATE }}"
