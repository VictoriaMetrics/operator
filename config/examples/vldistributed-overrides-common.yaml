apiVersion: operator.victoriametrics.com/v1alpha1
kind: VLDistributed
metadata:
  name: sample-override-common
spec:
  vmauth:
    name: global-vmauth
    spec:
      replicaCount: 1
      unauthorizedUserAccessSpec:
        targetRefs:
          - name: read
          - name: write
  zoneCommon:
    vlagent:
      spec:
        replicaCount: 1
    vlcluster:
      spec:
        vlstorage:
          replicaCount: 1
        vlselect:
          replicaCount: 1
        vlinsert:
          replicaCount: 1
        clusterVersion: v1.51.0
  zones:
    - name: us-east-1
    - name: us-west-2
    - name: eu-west-1
