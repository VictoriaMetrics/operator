name: Publish Reports
description: Publish JUnit test report

runs:
  using: composite
  steps:
    - name: Publish Test Report
      if: success() || failure()
      uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16  # v6.4.2
      with:
        report_paths: 'report.xml'
