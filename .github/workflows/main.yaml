name: Build and Test
# This workflow will run on master branch and on any pull requests targeting master
on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '!docs/**'
      - '!*.md'
      - '!.github/**'
      - '.github/workflows/main.yaml'
      - '.github/workflows/docs.yaml'
      - '!codespell/**'
      - 'LICENSE'
      - 'PROJECT'
  pull_request:
    branches:
      - master
      - release-*
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
    paths:
      - '**'
      - '!docs/**'
      - '!*.md'
      - '!.github/**'
      - '.github/actions/**'
      - '.github/workflows/main.yaml'
      - '.github/workflows/docs.yaml'
      - '!codespell/**'
      - 'LICENSE'
      - 'PROJECT'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Setup build environment
        id: setup
        uses: ./.github/actions/setup-build-env

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: "trivy-results.sarif"

      - name: Lint, Test and Build
        if: github.event.pull_request.draft == false
        env:
          DOCKER_BUILD_ARGS: --cache-from=type=gha --cache-to=type=gha,mode=max
          TAG: ${{ steps.setup.outputs.image-tag }}
          LICENSE_KEY: ${{ secrets.ENTERPRISE_COMPONENTS_LICENSE_KEY }}
        run: |
          make lint
          make manifests
          make api-gen
          make docs
          # check for uncommited changes to crds, docs or API
          git diff --exit-code
          make test
          git fetch origin ${{ github.base_ref || 'master' }}
          BASE_REF=origin/${{ github.base_ref || 'master' }} TAG=${TAG} make test-e2e
      - name: Save Go cache
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: ./.github/actions/save-go-cache
      - name: Publish reports
        uses: ./.github/actions/publish-reports
