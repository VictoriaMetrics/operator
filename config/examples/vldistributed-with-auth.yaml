apiVersion: operator.victoriametrics.com/v1beta1
kind: VMUser
metadata:
  name: vmuser-sample
spec:
  username: simple-user
  password: simple-password
  targetRefs:
  - name: write
  - name: read
---
apiVersion: operator.victoriametrics.com/v1alpha1
kind: VLDistributed
metadata:
  name: sample-override
spec:
  vmauth:
    name: global-vmauth
    spec:
      selectAllByDefault: true
      replicaCount: 1
  zoneCommon:
    vlagent:
      spec:
        replicaCount: 1
    vlcluster:
      name: vlcluster-%ZONE%
      spec:
        vlstorage:
          replicaCount: 1
        vlselect:
          replicaCount: 1
        vlinsert:
          replicaCount: 1
  zones:
    - name: us-east-1
    - name: us-west-2
